name: OOM Kill Recovery
description: >
  Handles pods being killed by the Linux OOM killer due to exceeding
  memory limits. Identifies the affected pods, increases limits, and
  monitors for recurrence.
severity: SEV2
category: oom
triggers:
  - OOMKilled
  - exit_code == 137
  - kube_pod_container_status_last_terminated_reason == OOMKilled

diagnosis:
  - Check container memory limits vs current usage
  - Check for memory leaks in logs (growing heap, GC pressure)
  - Check if usage is spiky (JVM, Python GC) vs linear growth (leak)
  - Check node memory pressure

steps:
  - step_number: 1
    description: "Get the previous container logs before OOM kill"
    command: "kubectl logs <POD_NAME> -n <NAMESPACE> --previous --tail=200"
    is_destructive: false
    is_automated: true

  - step_number: 2
    description: "Check current memory limits and usage for the deployment"
    command: "kubectl describe deployment <DEPLOYMENT_NAME> -n <NAMESPACE>"
    is_destructive: false
    is_automated: true

  - step_number: 3
    description: >
      Patch the deployment to increase memory limit by 50%.
      Replace CURRENT_LIMIT with the existing limit + 50%.
    command: >
      kubectl set resources deployment/<DEPLOYMENT_NAME>
      -n <NAMESPACE>
      --limits=memory=<NEW_LIMIT>Mi
      --requests=memory=<NEW_REQUEST>Mi
    is_destructive: false
    is_automated: false

  - step_number: 4
    description: "Rolling restart to apply new limits"
    command: "kubectl rollout restart deployment/<DEPLOYMENT_NAME> -n <NAMESPACE>"
    is_destructive: false
    is_automated: false

  - step_number: 5
    description: "Monitor the pod for memory growth after restart"
    command: "kubectl top pod -n <NAMESPACE> -l app=<APP_LABEL>"
    is_destructive: false
    is_automated: false

notes:
  - "JVM apps: set -Xmx to ~75% of memory limit"
  - "Python: check for list/dict accumulation without cleanup"
  - "If leak is suspected, enable heap dump before restart"
  - "Add VPA (Vertical Pod Autoscaler) for automatic right-sizing"
