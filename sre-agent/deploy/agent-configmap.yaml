---
apiVersion: v1
kind: Namespace
metadata:
  name: claritty
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: claritty-agent-config
  namespace: claritty
data:
  # The name of this cluster — must be unique per cluster
  CLARITTY_CLUSTER_NAME: "my-cluster"
  # URL of the external hub server
  CLARITTY_HUB_URL: "http://YOUR_HUB_SERVER:8822"
  # LLM provider settings
  LLM_PROVIDER: "groq"
  LLM_MODEL: "llama-3.3-70b-versatile"
  # Scan interval in seconds (default: 300 = 5 minutes)
  SCAN_INTERVAL_SECS: "300"
  # Comma-separated namespaces to watch. Leave empty for all.
  WATCH_NAMESPACES: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: claritty-agent-secrets
  namespace: claritty
type: Opaque
stringData:
  GROQ_API_KEY: "your_groq_api_key_here"
  # OPENAI_API_KEY: ""
  # CLARITTY_HUB_API_KEY: "optional_shared_secret"
