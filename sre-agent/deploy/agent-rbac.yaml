# RBAC for the Claritty SRE Agent
# Read-only access to all resources it needs — no write permissions.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claritty-agent
  namespace: claritty
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claritty-agent-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "namespaces", "events", "resourcequotas"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claritty-agent-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claritty-agent-reader
subjects:
  - kind: ServiceAccount
    name: claritty-agent
    namespace: claritty
