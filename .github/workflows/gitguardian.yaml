name: GitGuardian Security Scan

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  scanning:
    name: GitGuardian Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch all history so GitGuardian can scan the entire diff
      
      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@v1.33.0
        with:
          # Note: To use this action, you must set GITGUARDIAN_API_KEY as a repository secret.
          # You can get one for free at https://dashboard.gitguardian.com
          args: -v --all-policies
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
