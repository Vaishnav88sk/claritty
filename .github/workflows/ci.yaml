name: CI Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Check Formatting (go fmt)
        run: |
          cd clarctl-go
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted properly:"
            gofmt -s -l .
            exit 1
          fi

      - name: Static Analysis (go vet)
        run: |
          cd clarctl-go
          go vet ./...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Execute Unit Tests
        run: |
          cd clarctl-go
          go list -f '{{if len .TestGoFiles}}{{.ImportPath}}{{end}}' ./... | xargs -r go test -v -coverprofile=coverage.txt

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./clarctl-go/coverage.txt
          # Codecov token is not strictly required for public repos, but good practice
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
