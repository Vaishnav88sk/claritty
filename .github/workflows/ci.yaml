name: Claritty CI Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint:
    name: GolangCI Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: clarctl-go

  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Tests
        run: |
          cd clarctl-go
          go test -v -coverprofile=coverage.txt ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./clarctl-go/coverage.txt
          # Codecov token is not strictly required for public repos, but good practice
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  e2e:
    name: KinD E2E Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Kubernetes in Docker (KinD)
        uses: helm/kind-action@v1.10.0

      - name: Verify Cluster Info
        run: kubectl cluster-info

      - name: Deploy SRE Agent Manifests
        run: |
          # The agent expects the 'claritty' namespace to exist
          kubectl create namespace claritty
          
          # Create a dummy secret so the deployment doesn't crash on missing secret
          kubectl create secret generic claritty-agent-secrets -n claritty --from-literal=GROQ_API_KEY=dummy
          
          # Apply the manifests
          kubectl apply -f sre-agent/deploy/agent-rbac.yaml
          kubectl apply -f sre-agent/deploy/agent-configmap.yaml
          kubectl apply -f sre-agent/deploy/agent-deployment.yaml

      - name: Verify Agent Deployment
        run: |
          # Wait up to 90 seconds for the deployment to become ready
          kubectl rollout status deployment/claritty-agent -n claritty --timeout=90s
