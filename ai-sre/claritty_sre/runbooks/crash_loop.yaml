name: CrashLoopBackOff Recovery
description: >
  Handles pods stuck in CrashLoopBackOff state. Analyzes crash logs,
  identifies root cause, and provides a safe rollout restart or rollback.
severity: SEV2
category: crashloop
triggers:
  - CrashLoopBackOff
  - restart_count > 5
  - container state waiting with reason CrashLoopBackOff

diagnosis:
  - Check pod describe for exit codes (1=app error, 137=OOM, 143=SIGTERM)
  - Check previous container logs for panic/exception/fatal messages
  - Check if recently deployed (rollback candidate)
  - Check resource limits (memory limit too low = OOM = exit 137)

steps:
  - step_number: 1
    description: "Get the last 100 lines of logs from the crashing container"
    command: "kubectl logs <POD_NAME> -n <NAMESPACE> --previous --tail=100"
    is_destructive: false
    is_automated: true

  - step_number: 2
    description: "Describe the pod to see exact exit code and reason"
    command: "kubectl describe pod <POD_NAME> -n <NAMESPACE>"
    is_destructive: false
    is_automated: true

  - step_number: 3
    description: >
      If exit code is 137 (OOM): patch the deployment to increase memory limit.
      If exit code is 1 (app crash): check for config/secret issues.
    command: null
    is_destructive: false
    is_automated: false

  - step_number: 4
    description: "Rolling restart the deployment to get fresh pods"
    command: "kubectl rollout restart deployment/<DEPLOYMENT_NAME> -n <NAMESPACE>"
    is_destructive: false
    is_automated: false

  - step_number: 5
    description: "If restart doesn't help, check rollout history and consider rollback"
    command: "kubectl rollout history deployment/<DEPLOYMENT_NAME> -n <NAMESPACE>"
    is_destructive: false
    is_automated: false

  - step_number: 6
    description: "Force delete the crashing pod as last resort (controller will recreate)"
    command: "kubectl delete pod <POD_NAME> -n <NAMESPACE> --force --grace-period=0"
    is_destructive: true
    is_automated: false

notes:
  - "Exit code 137 almost always means OOM — increase memory limits"
  - "Exit code 1 = application error — check logs for the actual exception"
  - "Exit code 143 = SIGTERM — check liveness probes"
  - "Always prefer rollout restart over force delete"
